name: 15-Minute Cron Jobs

on:
  schedule:
    - cron: "*/15 * * * *" # Every 15 minutes
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  run-cron:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Reviews
        run: |
          curl -X GET "https://${{ secrets.APP_DOMAIN }}/api/cron/fetch-reviews?secret=${{ secrets.CRON_SECRET }}"

      - name: Send Replies
        run: |
          curl -X GET "https://${{ secrets.APP_DOMAIN }}/api/cron/send-replies?secret=${{ secrets.CRON_SECRET }}"
